<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatKoi SMP</title>

<style>
body {
  margin:0;
  font-family: Inter, sans-serif;
  background: linear-gradient(180deg,#fff7e8,#f3e3cf);
  color:#3b2a22;
}

/* layout */
.section {
  max-width:1100px;
  margin:40px auto;
  padding:0 20px;
}

h2 {
  margin-bottom:4px;
}

.subtitle {
  color:#8b6f5f;
  font-size:14px;
  margin-bottom:20px;
}

/* grid */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:18px;
}

/* cards */
.card {
  background:#fffaf1;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  transition:0.2s ease;
  cursor:pointer;
}

.card:hover {
  transform:translateY(-6px) scale(1.02);
  box-shadow:0 18px 40px rgba(0,0,0,0.12);
}

/* skin area */
.skin-wrap {
  height:160px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#ffe0ec,#d7f0e2);
}

.skin {
  height:130px;
  image-rendering:pixelated;
}

/* bottom info */
.info {
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.name {
  font-weight:700;
}

.role {
  font-size:12px;
  color:#8b6f5f;
}

.caption {
  font-size:12px;
  color:#d96d8a;
  margin-top:2px;
}

/* status */
.tag {
  font-size:11px;
  padding:6px 10px;
  border-radius:999px;
  font-weight:700;
}

.online {
  background:#d8f2e4;
  color:#2f7d59;
}

.offline {
  background:#f6d6d6;
  color:#a44;
}
</style>
</head>

<body>

<div class="section">
  <h2>💖 Founders</h2>
  <div class="subtitle">The heart of CatKoi SMP.</div>

  <div id="founders" class="grid"></div>
</div>

<div class="section">
  <h2>🌱 Members</h2>
  <div id="members" class="grid"></div>
</div>

<script>
const FOUNDERS = [
  { name:"Lakoi" },
  { name:"iamturtlee", caption:"the reason this server exists" }
];

const MEMBERS = [
  { name:"alegingerale" },
  { name:"PoTaToSudi" },
  { name:"Qrib" },
  { name:"Zeyichun" },
  { name:"Jackcole194" },
  { name:"TheMintTea" },
  { name:"Lutrasss" },
  { name:"General_Luke" },
  { name:"Nero_ysa" }
];

/* skin function (FIXED) */
function skin(name){
  return `https://mc-heads.net/body/${name}/160`;
}

/* fake status (you can hook API back later) */
function getStatus(name){
  const onlinePlayers = ["Qrib","Nero_ysa"]; // example
  return onlinePlayers.includes(name);
}

function render(list, containerId, isFounder=false){
  const container = document.getElementById(containerId);

  container.innerHTML = list.map(player=>{
    const online = getStatus(player.name);

    return `
    <div class="card">
      <div class="skin-wrap">
        <img class="skin" src="${skin(player.name)}">
      </div>

      <div class="info">
        <div>
          <div class="name">${player.name}</div>
          <div class="role">${isFounder ? "Founder" : "Member"}</div>
          ${player.caption ? `<div class="caption">${player.caption}</div>` : ""}
        </div>

        <div class="tag ${online ? "online":"offline"}">
          ${online ? "Online":"Offline"}
        </div>
      </div>
    </div>
    `;
  }).join("");
}

render(FOUNDERS,"founders",true);
render(MEMBERS,"members");
</script>

</body>
</html>
